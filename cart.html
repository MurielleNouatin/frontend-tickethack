<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="cartPage">
  <header id="mainHeader"></header>

  <div class="cartBackground">
    <div class="cartBlock">
      
      <div id="emptyCartMessage">
        <p>No tickets in you cart.</p>
        <p>Why not plan a trip?</p>
      </div>

    <div id="cartContent">
      <div class="cartBox">
        <h1>My Cart</h1>
        <div id="cartContainer"></div>
      </div>
      <div class="cartFooter">
        <div id="totalContainer"></div>
        <button id="purchase">Purchase</button>
      </div>
    </div>
  </div>
  <script src="header.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/min/moment.min.js"></script> <!-- ajout Mathieu -->
  <script src="cart.js"></script>
</body>
</html>
